<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Sync Failed - Tokyomap.live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background-color: #f4f7f6;
        color: #2d3436;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100vw;
      }

      .container {
        text-align: center;
        background: #ffffff;
        padding: 3.5rem 2rem;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        max-width: 420px;
        width: 90%;
      }

      .icon-wrapper {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: inline-block;
        animation: pulse 2s infinite ease-in-out;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0 0 1rem 0;
        letter-spacing: -0.03em;
      }

      p {
        color: #636e72;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        font-size: 1rem;
      }

      .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      .button {
        flex: 1;
        padding: 0.8rem 0;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        font-size: 0.95rem;
        transition: all 0.2s ease;
      }

      .button-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .button-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
      }

      .button-secondary {
        background: #f1f2f6;
        color: #2d3436;
      }

      .button-secondary:hover {
        background: #e2e5e9;
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrapper">⚠️</div>
      <h1>Sync Failed</h1>
      <p>
        An error occurred while synchronizing with the server.<br>
        Your session may have expired or the service is temporarily unavailable.
      </p>
      <div class="btn-group">
        <a href="/" class="button button-primary">Back to Map</a>
        <a href="javascript:location.reload()" class="button button-secondary">Retry</a>
      </div>
    </div>
  </body>
</html>
