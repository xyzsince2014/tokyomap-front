name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - master
    paths:
      - 'tokyomap-front/**' # only runs when the codebase changes

permissions:
  id-token: write # required for AWS OIDC integration
  contents: read

env:
  AWS_REGION: ap-northeast-1
  # IAM role, created with OIDC settings for GitHub Actions.
  AWS_ROLE_ARN: arn:aws:iam::914087091933:role/GitHubActionsFrontendDeployRole
  S3_BUCKET: s3://tokyomap-frontend-bucket-name # bucket name generated by CDK
  CLOUDFRONT_ID: EGJ7CTW4WK85F # CloudFront Distribution ID

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tokyomap-front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './tokyomap-front/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Retrieve AWS credentials (no need to hardcode access keys!)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Upload to S3
      - name: Sync S3
        run: aws s3 sync ./public ${{ env.S3_BUCKET }} --delete

      # Invalidate CloudFront cache
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_ID }} --paths "/*"
